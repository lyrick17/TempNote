<div class="NgxEditor__Wrapper w-full">
  <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"> </ngx-editor-menu>
  <ngx-editor
    [editor]="editor"
    [(ngModel)]="html"
    (ngModelChange)="valueChange.emit($event)"
    [disabled]="false"
    [placeholder]="'Type your notes here...'"
    class="block"
  ></ngx-editor>
</div>
