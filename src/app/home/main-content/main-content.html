<article
  class="mx-1 my-2 md:my-0 p-4 flex flex-col items-end rounded-md secondary-color shadow-xl"
>
  <section class="flex justify-between w-full mb-2">
    <input
      type="text"
      [(ngModel)]="notes.currentNote().title"
      (ngModelChange)="onTitleInput($event)"
      class="border-b w-75 placeholder:text-grey-400 focus:outline-none focus:ring-0 px-2"
      [class]="
        themeToggleService.currentTheme === themes.DARK
          ? 'text-[#252627] bg-[#f6fff8] border-gray-200 rounded-md'
          : ''
      "
      placeholder="Enter note title here..."
    />
    <button
      (click)="createNewNote()"
      class="primary-color rounded-md px-4 py-2"
    >
      <app-plus-icon fill="var(--textColor)" />
    </button>
  </section>
  <text-editor
    [(value)]="notes.currentNote().content"
    (valueChange)="onTextInput($event)"
    class="w-full border tertiary-color border-color rounded"
  ></text-editor>
  <div class="py-1">
    <small class="italic">
      <!-- Note: All notes written in TempNote will not be saved once you close the
      site. Please export the notes when necessary. -->
      Note: All notes written in TempNote will not be saved once you close the
      site.
    </small>
  </div>
  <!-- <button
    (click)="downloadNoteAsTextFile()"
    class="flex items-center blue-color text-white rounded-md px-4 py-2"
  >
    <app-download-icon style="color: white" fill="white" />
    <span class="pl-2">Export Note</span>
  </button> -->
</article>
