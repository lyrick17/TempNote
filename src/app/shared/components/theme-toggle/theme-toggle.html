<button (click)="toggle()">
  @if (themeService.currentTheme == themes.LIGHT) {
    <!-- Moon Icon -->
    <div class="cursor-pointer hover:bg-gray-700/50 p-2 rounded-full">
      <app-moon-icon
        size="20"
        fill="var(--textColor)"
        class="bi bi-moon-fill"
      />
    </div>
  } @else {
    <!-- Sun Icon -->
    <div class="cursor-pointer hover:bg-gray-400/50 p-2 rounded-full">
      <app-sun-icon size="20" fill="var(--textColor)" class="bi bi-moon-fill" />
    </div>
  }
</button>
