<nav class="flex flex-col md:flex-row gap-2 w-full px-4 mb-4">
  @if (isHome()) {
    <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer"
      [ngClass]="{
        'tertiary-color border-2 border-color':
          homeTab.tabState() == 'scratchpad',
        'translucent-secondary-color': homeTab.tabState() == 'stash',
      }"
      (click)="setHomeTab('scratchpad')"
    >
      Scratchpad
    </button>
    <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer"
      [ngClass]="{
        'tertiary-color border-2 border-color': homeTab.tabState() == 'stash',
        'translucent-secondary-color': homeTab.tabState() == 'scratchpad',
      }"
      (click)="setHomeTab('stash')"
    >
      Stash
    </button>
  } @else {
    <button
      class="rounded-full translucent-secondary-color px-3 py-1 cursor-pointer"
      routerLink="/"
    >
      ← Back to Notes
    </button>
    <!-- <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer"
      [ngClass]="{
        'tertiary-color border-2 border-color': currentUrl() == '/about',
        'translucent-secondary-color': currentUrl() != '/about',
      }"
      routerLink="/about"
    >
      About
    </button> -->
    <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer"
      [ngClass]="{
        'tertiary-color border-2 border-color':
          currentUrl() == '/privacy-policy',
        'translucent-secondary-color': currentUrl() != '/privacy-policy',
      }"
      routerLink="/privacy-policy"
    >
      Privacy Policy
    </button>
    <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer"
      [ngClass]="{
        'tertiary-color border-2 border-color':
          currentUrl() == '/terms-and-conditions',
        'translucent-secondary-color': currentUrl() != '/terms-and-conditions',
      }"
      routerLink="/terms-and-conditions"
    >
      Terms and Conditions
    </button>
  }
</nav>
