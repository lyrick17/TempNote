<nav class="flex flex-col md:flex-row gap-2 w-full px-4 mb-4">
  <button
    class="rounded-full w-full flex-1 tertiary-color border-2 border-color px-3 py-1 cursor-pointer"
    [ngClass]="{
      'tertiary-color border-2 border-color':
        homeTab.tabState() == 'scratchpad',
      'translucent-secondary-color': homeTab.tabState() == 'stash',
    }"
    (click)="setHomeTab('scratchpad')"
  >
    Scratchpad
  </button>
  <button
    class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer"
    [ngClass]="{
      'tertiary-color border-2 border-color': homeTab.tabState() == 'stash',
      'translucent-secondary-color': homeTab.tabState() == 'scratchpad',
    }"
    (click)="setHomeTab('stash')"
  >
    Stash
  </button>
</nav>
