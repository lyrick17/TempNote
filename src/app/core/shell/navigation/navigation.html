<nav class="flex flex-col md:flex-row gap-2 w-full px-4 mb-4">
  @if (isHome()) {
    <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer transition-colors"
      [ngClass]="{
        'bg-[var(--creamColor)] text-[#252627] border-2 border-[var(--primaryColor)]':
          homeTab.tabState() == 'scratchpad',
        'bg-[var(--translucentSecondaryColor)] hover:bg-[var(--secondaryHoveredColor)]':
          homeTab.tabState() == 'stash',
      }"
      (click)="setHomeTab('scratchpad')"
    >
      Scratchpad
    </button>
    <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer transition-colors"
      [ngClass]="{
        'bg-[var(--creamColor)] text-[#252627] border-2 border-[var(--primaryColor)]':
          homeTab.tabState() == 'stash',
        'bg-[var(--translucentSecondaryColor)] hover:bg-[var(--secondaryHoveredColor)]':
          homeTab.tabState() == 'scratchpad',
      }"
      (click)="setHomeTab('stash')"
    >
      Stash
    </button>
  } @else {
    <button
      class="rounded-full bg-[var(--translucentSecondaryColor)] hover:bg-[var(--secondaryHoveredColor)] px-3 py-1 cursor-pointer transition-colors"
      routerLink="/"
    >
      ← Back to Notes
    </button>
    <!-- <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer transition-colors"
      [ngClass]="{
        'bg-[var(--creamColor)] text-[#252627] border-2 border-[var(--primaryColor)]': currentUrl() == '/about',
        'bg-[var(--translucentSecondaryColor)] hover:bg-[var(--secondaryHoveredColor)]': currentUrl() != '/about',
      }"
      routerLink="/about"
    >
      About
    </button> -->
    <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer transition-colors"
      [ngClass]="{
        'bg-[var(--creamColor)] text-[#252627] border-2 border-[var(--primaryColor)]':
          currentUrl() == '/privacy-policy',
        'bg-[var(--translucentSecondaryColor)] hover:bg-[var(--secondaryHoveredColor)]':
          currentUrl() != '/privacy-policy',
      }"
      routerLink="/privacy-policy"
    >
      Privacy Policy
    </button>
    <button
      class="rounded-full w-full flex-1 px-3 py-1 cursor-pointer transition-colors"
      [ngClass]="{
        'bg-[var(--creamColor)] text-[#252627] border-2 border-[var(--primaryColor)]':
          currentUrl() == '/terms-and-conditions',
        'bg-[var(--translucentSecondaryColor)] hover:bg-[var(--secondaryHoveredColor)]':
          currentUrl() != '/terms-and-conditions',
      }"
      routerLink="/terms-and-conditions"
    >
      Terms and Conditions
    </button>
  }
</nav>
